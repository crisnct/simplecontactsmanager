version: "3.9"

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  environment: &kafka-common-env
    CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@scm-kafka-1:29093,2@scm-kafka-2:29093,3@scm-kafka-3:29093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    KAFKA_LOG_DIRS: /var/lib/kafka/data
    CONFLUENT_SUPPORT_CUSTOMER_ID: "anonymous"

services:
  mysql:
    image: mysql:8.4
    container_name: scm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    <<: *kafka-common
    container_name: scm-kafka-1
    hostname: scm-kafka-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://scm-kafka-1:29092,EXTERNAL://localhost:9092
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-2:
    <<: *kafka-common
    container_name: scm-kafka-2
    hostname: scm-kafka-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://scm-kafka-2:29092,EXTERNAL://localhost:9093
    volumes:
      - kafka_2_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-3:
    <<: *kafka-common
    container_name: scm-kafka-3
    hostname: scm-kafka-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://scm-kafka-3:29092,EXTERNAL://localhost:9094
    volumes:
      - kafka_3_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: scm-kafka-ui
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "9095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: scm-kafka-1:29092,scm-kafka-2:29092,scm-kafka-3:29092
      KAFKA_CLUSTERS_0_KRAFT: "true"

  weather-service:
    build:
      context: .
      dockerfile: weather-service/Dockerfile
    container_name: scm-weather
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SERVER_PORT: 9000
      KAFKA_BOOTSTRAP_SERVERS: scm-kafka-1:29092,scm-kafka-2:29092,scm-kafka-3:29092
      KAFKA_EDIT_CONTACT_TOPIC: edit-contact
    ports:
      - "9000:9000"

  contacts-service:
    build:
      context: .
      dockerfile: contacts-service/Dockerfile
    container_name: scm-contacts
    depends_on:
      mysql:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      weather-service:
        condition: service_started
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: contacts_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_PORT: 9001
      WEATHER_SERVICE_URL: http://weather-service:9000
      KAFKA_BOOTSTRAP_SERVERS: scm-kafka-1:29092,scm-kafka-2:29092,scm-kafka-3:29092
      KAFKA_SIGNUP_TOPIC: user-signups
      KAFKA_EDIT_CONTACT_TOPIC: edit-contact
    ports:
      - "9003:9001"

volumes:
  mysql_data:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data: